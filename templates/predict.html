<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Predict HDI</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand"

href="/">

🌍 HDI Predictor

</a>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg">

<div class="card-body p-5">

<h2 class="text-center mb-4">

Predict HDI Score

</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>
<div class="mb-3">

<label class="form-label">

Select Country

</label>

<select
id="country"
class="form-select">

<option value="">Choose Country</option>

{% for country in countries %}

<option value="{{ country }}">

{{ country }}

</option>

{% endfor %}

</select>

</div>
Life Expectancy

</label>

<input

type="number"

step="0.01"

name="life"

class="form-control"

placeholder="Example : 72"

required>

</div>

<div class="col-md-6 mb-3">

<label>

Expected Schooling

</label>

<input
id="expected"
type="number"
step="0.01"
name="expected"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Mean Schooling

</label>

<input
id="mean"
type="number"
step="0.01"
name="mean"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Gross National Income

</label>

<input

<input
id="gni"
type="number"
step="0.01"
name="gni"
class="form-control"
required>

</div>

</div>

<div class="text-center mt-4">

<button

class="btn btn-primary btn-lg">

Predict HDI

</button>

<button

type="reset"

class="btn btn-secondary btn-lg">

Reset

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>
<script src="{{ url_for('static', filename='js/autofill.js') }}"></script>

</body>

</html>
